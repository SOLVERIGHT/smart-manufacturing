resources:
  jobs:
    oee_pipeline:
      name: oee-pipeline

      tasks:
        - task_key: bronze_ingestion
          spark_python_task:
            python_file: ../src/bronze/autoloader_quality_downtime.py
          environment_key: default

        - task_key: silver_production_data
          depends_on:
            - task_key: bronze_ingestion
          spark_python_task:
            python_file: ../src/silver/production_data.py
          environment_key: default
        - task_key: gold_oee_metrics
          depends_on:
            - task_key: silver_production_data
          spark_python_task:
            python_file: ../src/gold/oee_metrics.py

  environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"